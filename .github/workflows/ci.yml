name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy haystack_sdk
      - name: Vocabulary in sync with JSON sources
        run: uv run python scripts/generate_vocabulary.py --check
      - name: Tests
        run: uv run pytest tests/ -v
