repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: vocabulary-generated
        name: vocabulary modules in sync with JSON sources
        entry: python scripts/generate_vocabulary.py --check
        language: system
        files: ^haystack_sdk/vocabulary/(data/.*\.json|.*\.py)$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy haystack_sdk
        language: system
        pass_filenames: false

